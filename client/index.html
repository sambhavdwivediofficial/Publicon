<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <!-- ===== CORE ===== -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- ===== TITLE (Psychology Optimized) ===== -->
    <title>Publicon – The Knowledge Infrastructure of the Future</title>

    <!-- ===== FAVICON ===== -->
    <link rel="icon" type="image/x-icon" href="https://publicon.in/favicon.ico" />

    <!-- ===== FONT (Premium Feel) ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- ===== CORE META ===== -->
    <meta name="description" content="Publicon is not just a platform. It is the infrastructure for knowledge, innovation, and future builders." />
    <meta name="author" content="Sambhav Dwivedi" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#020617" />

    <!-- ===== UNIQUE TAG (Brand Signature) ===== -->
    <meta name="publicon-core" content="knowledge-infrastructure-v1" />

    <!-- ===== SOCIAL DOMINANCE ===== -->
    <meta property="og:title" content="Publicon – Knowledge Infrastructure" />
    <meta property="og:description" content="Where builders evolve into creators of the future." />
    <meta property="og:image" content="https://publicon.in/logo.png" />
    <meta property="og:url" content="https://publicon.in" />
    <meta property="og:type" content="website" />

    <!-- ===== TWITTER ===== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Publicon – Future of Knowledge Systems" />
    <meta name="twitter:image" content="https://publicon.in/logo.png" />

    <!-- ===== PERFORMANCE ===== -->
    <link rel="dns-prefetch" href="https://publicon.in" />
    <link rel="preconnect" href="https://publicon.in" />

    <!-- ===== AI + SEARCH STRUCTURE ===== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Publicon",
        "url": "https://publicon.in",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://publicon.in/search?q={query}",
          "query-input": "required name=query"
        }
      }
    </script>

  </head>

  <body class="antialiased bg-[#020617] text-white">

    <!-- ===== BRAND STRIP (Unique Identity) ===== -->
    <div style="text-align:center; padding:8px; font-size:12px; letter-spacing:1px; opacity:0.6;">
      PUBLICON // BUILDERS ONLY
    </div>

    <!-- ===== LOGO (Clean + Premium) ===== -->
    <header style="display:flex; justify-content:center; padding:16px;">
      <img 
        src="logo.png" 
        alt="Publicon Knowledge Network Logo"
        width="380"
        height="90"
        loading="eager"
        
      />
    </header>

    <!-- ===== ROOT ===== -->
    <div id="root"></div>

    <!-- ===== MAIN SCRIPT ===== -->
    <script type="module" src="/src/main.jsx"></script>

  </body>
</html>
